version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tripcraft_user
      POSTGRES_PASSWORD: tripcraft_pass
      POSTGRES_DB: tripcraft
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://tripcraft_user:tripcraft_pass@db:5432/tripcraft
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  redis_data:
